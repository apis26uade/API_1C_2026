spring.application.name=goated

# ── MySQL ──────────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/goated_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ────────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ── JWT ────────────────────────────────────────────────────────────────────────
# 256-bit Base64 secret (replace with your own in production)
application.security.jwt.secret-key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
# 24 hours in ms
application.security.jwt.expiration=86400000

logging.level.org.springframework.security=DEBUG
